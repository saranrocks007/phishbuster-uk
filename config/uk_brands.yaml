# ==================================================================
# Free-form UK-specific indicators (language cues that rarely appear
# in legitimate UK business mail but are common in phishing lures)
# ==================================================================
suspicious_phrases:
  - "dear customer"
  - "dear user"
  - "dear account holder"
  - "your account will be suspended"
  - "24 hours to verify"
  - "48 hours to verify"
  - "click the link below to verify"
  - "failure to do so"
  - "your account has been limited"
  - "kindly"
  - "we have temporarily suspended"
  - "due to unusual activity"
  - "you have been selected"
  - "congratulations you have won"
  - "please update your details"
  - "we were unable to deliver"
  - "a small shipping fee"
  - "your parcel is waiting"
