# ==================================================================
# UK Brand Impersonation Reference Database
# Curated list of most-impersonated UK brands in phishing campaigns.
# Each brand has:
#   - legitimate_domains: canonical sending domains
#   - display_aliases: common From-name spoofs
#   - keywords: body/subject tokens signalling impersonation attempt
#   - typical_lures: known lure themes
#   - severity: base severity modifier (1.0 - 1.5)
# ==================================================================

brands:

