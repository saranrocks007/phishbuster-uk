  hmrc:
    name: "HM Revenue & Customs"
    category: government
    severity: 1.4
    legitimate_domains:
      - gov.uk
      - hmrc.gov.uk
      - taxservice.gov.uk
      - taxrefund.hmrc.gov.uk
    display_aliases:
      - "HMRC"
      - "HM Revenue & Customs"
      - "HM Revenue and Customs"
      - "Her Majesty's Revenue and Customs"
      - "His Majesty's Revenue and Customs"
      - "Gov.UK"
      - "GOV.UK"
    keywords:
      - "tax refund"
      - "tax rebate"
      - "self assessment"
      - "self-assessment"
      - "outstanding tax"
      - "tax calculation"
      - "p800"
      - "utr number"
      - "unique taxpayer reference"
      - "national insurance number suspended"
      - "hmrc owes you"
      - "claim your refund"
      - "tax overpayment"
